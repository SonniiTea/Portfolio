<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Embedded demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: linear-gradient(160deg, #f0e8ff 0%, #e0f2fe 100%);
        color: #1e1b4b;
      }
      .card {
        padding: 1.25rem 1.5rem;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 8px 30px rgba(91, 80, 120, 0.15);
        text-align: center;
        max-width: 280px;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 1rem;
        font-size: 0.85rem;
        opacity: 0.85;
        line-height: 1.45;
      }
      button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 999px;
        background: #6366f1;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.9rem;
      }
      button:hover {
        background: #4f46e5;
      }
      .n {
        font-size: 1.75rem;
        font-weight: 800;
        margin: 0.5rem 0;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>iframe mini-demo</h1>
      <p>
        This HTML lives in <code>public/embed-demo/</code>. Replace it with your
        own static build or point the iframe at an external embed URL.
      </p>
      <div class="n" id="n">0</div>
      <button type="button" id="btn">Tap</button>
    </div>
    <script>
      var n = 0;
      var el = document.getElementById("n");
      document.getElementById("btn").onclick = function () {
        n += 1;
        el.textContent = n;
      };
    </script>
  </body>
</html>
